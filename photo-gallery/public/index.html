<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photo Gallery</title>
<meta name="description" content="A curated photo gallery">
<style>
  :root {
    --bg: #faf9f7;
    --surface: #ffffff;
    --border: #e8e4de;
    --border2: #d4cfc8;
    --text: #1a1816;
    --text2: #6b6560;
    --text3: #a8a29c;
    --accent: #8b6f4e;
    --radius: 10px;
    --radius-lg: 14px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #111110; --surface: #1c1b19; --border: #2a2825; --border2: #3a3733;
      --text: #e8e4de; --text2: #8a8580; --text3: #504d48; --accent: #c8a97e;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'SF Pro Text', 'PingFang SC', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* Header */
  header { position: sticky; top: 0; z-index: 50; background: var(--bg); border-bottom: 1px solid var(--border); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); background: color-mix(in srgb, var(--bg) 88%, transparent); }
  .header-inner { max-width: 1200px; margin: 0 auto; padding: 0 24px; height: 56px; display: flex; align-items: center; gap: 20px; }
  .logo { font-size: 15px; font-weight: 600; color: var(--text); letter-spacing: -.2px; white-space: nowrap; }
  .logo span { color: var(--accent); }

  /* Tag filter bar */
  .tag-bar { flex: 1; display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none; padding: 4px 0; }
  .tag-bar::-webkit-scrollbar { display: none; }
  .tag-pill { display: inline-flex; align-items: center; gap: 5px; padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 500; cursor: pointer; white-space: nowrap; border: 1px solid var(--border); background: transparent; color: var(--text2); transition: all .15s; user-select: none; }
  .tag-pill:hover { border-color: var(--border2); color: var(--text); }
  .tag-pill.active { color: var(--surface); border-color: transparent; }
  .tag-pill .pill-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .tag-pill .pill-count { font-size: 10px; opacity: .7; }
  .clear-btn { padding: 5px 11px; border-radius: 20px; font-size: 12px; cursor: pointer; border: 1px solid var(--border); background: transparent; color: var(--text3); transition: all .15s; white-space: nowrap; display: none; }
  .clear-btn:hover { color: var(--text2); }
  .clear-btn.visible { display: block; }

  /* Controls bar */
  .controls { max-width: 1200px; margin: 0 auto; padding: 14px 24px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .result-count { font-size: 13px; color: var(--text3); }
  .sort-select { margin-left: auto; font-size: 12px; padding: 5px 10px; border-radius: var(--radius); border: 1px solid var(--border); background: var(--surface); color: var(--text2); cursor: pointer; }
  .view-toggle { display: flex; gap: 2px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 2px; }
  .view-btn { padding: 4px 8px; border-radius: 7px; border: none; background: transparent; color: var(--text3); cursor: pointer; font-size: 14px; transition: all .12s; }
  .view-btn.active { background: var(--border); color: var(--text); }

  /* Gallery */
  .gallery-wrap { max-width: 1200px; margin: 0 auto; padding: 0 24px 40px; }
  .masonry { columns: 5; gap: 12px; }
  .masonry.cols-3 { columns: 3; }
  .masonry.cols-4 { columns: 4; }
  @media (max-width: 1100px) { .masonry { columns: 4; } .masonry.cols-3 { columns: 3; } }
  @media (max-width: 800px) { .masonry { columns: 3; } .masonry.cols-3 { columns: 2; } }
  @media (max-width: 560px) { .masonry { columns: 2; } }

  .photo-card { break-inside: avoid; margin-bottom: 12px; border-radius: var(--radius-lg); overflow: hidden; background: var(--surface); border: 1px solid var(--border); cursor: pointer; transition: transform .2s, box-shadow .2s; position: relative; display: block; }
  .photo-card:hover { transform: translateY(-3px); box-shadow: 0 12px 32px rgba(0,0,0,.1); }
  .photo-card img { width: 100%; display: block; background: var(--border); }
  .card-info { padding: 8px 10px 10px; }
  .card-title { font-size: 12px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px; }
  .card-date { font-size: 11px; color: var(--text3); margin-bottom: 5px; }
  .card-tags { display: flex; flex-wrap: wrap; gap: 3px; }
  .mini-tag { font-size: 10px; padding: 2px 6px; border-radius: 8px; font-weight: 500; }
  .card-hover { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,.5) 0%, transparent 50%); opacity: 0; transition: opacity .2s; border-radius: var(--radius-lg); display: flex; align-items: flex-end; padding: 10px; }
  .photo-card:hover .card-hover { opacity: 1; }
  .card-hover-title { font-size: 12px; color: #fff; font-weight: 500; }

  /* Grid view */
  .grid-view { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
  .grid-view .photo-card { margin-bottom: 0; }
  .grid-view .photo-card img { aspect-ratio: 1; object-fit: cover; }

  /* Empty & Loading */
  .empty-state { text-align: center; padding: 80px 20px; color: var(--text3); }
  .empty-state h3 { font-size: 16px; font-weight: 500; margin-bottom: 8px; color: var(--text2); }
  .loader { display: flex; justify-content: center; padding: 60px; gap: 6px; }
  .loader span { width: 6px; height: 6px; border-radius: 50%; background: var(--border2); animation: bounce .9s infinite; }
  .loader span:nth-child(2) { animation-delay: .15s; }
  .loader span:nth-child(3) { animation-delay: .3s; }
  @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-8px); } }

  /* Lightbox */
  .lb { position: fixed; inset: 0; background: rgba(0,0,0,.92); z-index: 1000; display: none; align-items: center; justify-content: center; }
  .lb.open { display: flex; }
  .lb-img-wrap { max-width: min(90vw, 1000px); max-height: 85vh; display: flex; align-items: center; justify-content: center; }
  .lb-img-wrap img { max-width: 100%; max-height: 85vh; border-radius: var(--radius-lg); object-fit: contain; display: block; }
  .lb-meta { position: fixed; bottom: 0; left: 0; right: 0; padding: 20px 24px; background: linear-gradient(to top, rgba(0,0,0,.8), transparent); color: #fff; display: flex; align-items: flex-end; gap: 16px; }
  .lb-meta-text h3 { font-size: 15px; font-weight: 500; margin-bottom: 3px; }
  .lb-meta-text p { font-size: 12px; opacity: .6; }
  .lb-meta-tags { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 6px; }
  .lb-tag { font-size: 11px; padding: 2px 8px; border-radius: 10px; background: rgba(255,255,255,.15); color: #fff; }
  .lb-close { position: fixed; top: 16px; right: 20px; background: rgba(255,255,255,.12); border: none; color: #fff; width: 36px; height: 36px; border-radius: 50%; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; }
  .lb-nav { position: fixed; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,.1); border: none; color: #fff; width: 44px; height: 44px; border-radius: 50%; cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center; transition: background .15s; }
  .lb-nav:hover { background: rgba(255,255,255,.2); }
  .lb-nav.prev { left: 16px; }
  .lb-nav.next { right: 16px; }
  .lb-counter { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); font-size: 12px; color: rgba(255,255,255,.5); }

  /* Timeline section headers (date mode) */
  .timeline-group { margin-bottom: 4px; }
  .timeline-label { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 1px; padding: 16px 0 8px; }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">Photo<span>.</span></div>
    <div class="tag-bar" id="tagBar"></div>
    <button class="clear-btn" id="clearBtn" onclick="clearTags()">✕ 清除</button>
  </div>
</header>

<div class="controls">
  <span class="result-count" id="resultCount"></span>
  <select class="sort-select" id="sortSelect" onchange="render()">
    <option value="date-desc">最新优先</option>
    <option value="date-asc">最早优先</option>
    <option value="name-asc">名称 A→Z</option>
  </select>
  <div class="view-toggle">
    <button class="view-btn active" id="vBtn-masonry" onclick="setView('masonry')" title="瀑布流">⊟</button>
    <button class="view-btn" id="vBtn-grid" onclick="setView('grid')" title="方格">⊞</button>
  </div>
</div>

<div class="gallery-wrap">
  <div id="loader" class="loader"><span></span><span></span><span></span></div>
  <div id="galleryEl" class="masonry"></div>
</div>

<!-- Lightbox -->
<div class="lb" id="lb" onclick="closeLb(event)">
  <button class="lb-close" onclick="closeLb()">✕</button>
  <button class="lb-nav prev" onclick="lbNav(-1);event.stopPropagation()">‹</button>
  <button class="lb-nav next" onclick="lbNav(1);event.stopPropagation()">›</button>
  <span class="lb-counter" id="lbCounter"></span>
  <div class="lb-img-wrap"><img id="lbImg" src="" alt=""></div>
  <div class="lb-meta">
    <div class="lb-meta-text">
      <h3 id="lbTitle"></h3>
      <p id="lbDate"></p>
      <div class="lb-meta-tags" id="lbTags"></div>
    </div>
  </div>
</div>

<script>
// ── Config: filled by the deploy script or manually ──────
// Replace with your own values, or keep as-is and set via config.js
const SUPABASE_URL = window.GALLERY_CONFIG?.supabaseUrl || '';
const SUPABASE_KEY = window.GALLERY_CONFIG?.supabaseKey || '';

let allPhotos = [], allTags = [], activeTags = new Set(), viewMode = 'masonry';
let lbFiltered = [], lbIndex = 0;

async function sbGet(path) {
  if (!SUPABASE_URL) return [];
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
  });
  return r.ok ? r.json() : [];
}

async function init() {
  [allTags, allPhotos] = await Promise.all([
    sbGet('tags?select=*&order=name.asc'),
    sbGet('photos?select=*&order=date.desc,created_at.desc'),
  ]);
  document.getElementById('loader').style.display = 'none';
  renderTagBar();
  render();
}

function renderTagBar() {
  const counts = {};
  allPhotos.forEach(p => (p.tags || []).forEach(tid => counts[tid] = (counts[tid] || 0) + 1));
  document.getElementById('tagBar').innerHTML = allTags
    .filter(t => counts[t.id] > 0)
    .sort((a, b) => (counts[b.id] || 0) - (counts[a.id] || 0))
    .map(t => {
      const active = activeTags.has(t.id);
      const bg = active ? t.color : 'transparent';
      const color = active ? '#fff' : 'var(--text2)';
      const border = active ? t.color : 'var(--border)';
      return `<span class="tag-pill${active ? ' active' : ''}" onclick="toggleTag('${t.id}')"
        style="background:${bg};border-color:${border};color:${color}">
        <span class="pill-dot" style="background:${active ? 'rgba(255,255,255,.7)' : t.color}"></span>
        ${t.name}<span class="pill-count">${counts[t.id] || 0}</span>
      </span>`;
    }).join('');
  document.getElementById('clearBtn').classList.toggle('visible', activeTags.size > 0);
}

function getFiltered() {
  let list = [...allPhotos];
  if (activeTags.size > 0) list = list.filter(p => (p.tags || []).some(tid => activeTags.has(tid)));
  const s = document.getElementById('sortSelect').value;
  if (s === 'date-desc') list.sort((a, b) => (b.date || '').localeCompare(a.date || ''));
  else if (s === 'date-asc') list.sort((a, b) => (a.date || '').localeCompare(b.date || ''));
  else if (s === 'name-asc') list.sort((a, b) => (a.title || '').localeCompare(b.title || '', 'zh'));
  return list;
}

function render() {
  const list = getFiltered();
  lbFiltered = list;
  document.getElementById('resultCount').textContent = `${list.length} 张`;
  const g = document.getElementById('galleryEl');
  g.className = viewMode === 'grid' ? 'grid-view' : 'masonry';

  if (!list.length) {
    g.innerHTML = `<div class="empty-state"><h3>没有找到图片</h3><p>试试清除标签筛选</p></div>`;
    return;
  }

  g.innerHTML = list.map((p, i) => {
    const tagHtml = (p.tags || []).map(tid => {
      const t = allTags.find(x => x.id === tid);
      return t ? `<span class="mini-tag" style="background:${t.color}22;color:${t.color}">${t.name}</span>` : '';
    }).join('');
    return `<div class="photo-card" onclick="openLb(${i})">
      <img src="${p.thumb_url || p.url}" alt="${p.title || ''}" loading="lazy">
      <div class="card-hover"><span class="card-hover-title">${p.title || ''}</span></div>
      <div class="card-info">
        <div class="card-title">${p.title || '无标题'}</div>
        <div class="card-date">${p.date || ''}</div>
        <div class="card-tags">${tagHtml}</div>
      </div>
    </div>`;
  }).join('');
}

function toggleTag(id) {
  activeTags.has(id) ? activeTags.delete(id) : activeTags.add(id);
  renderTagBar();
  render();
}

function clearTags() { activeTags.clear(); renderTagBar(); render(); }

function setView(mode) {
  viewMode = mode;
  document.getElementById('vBtn-masonry').classList.toggle('active', mode === 'masonry');
  document.getElementById('vBtn-grid').classList.toggle('active', mode === 'grid');
  render();
}

function openLb(i) { lbIndex = i; showLb(); document.getElementById('lb').classList.add('open'); }
function showLb() {
  const p = lbFiltered[lbIndex];
  if (!p) return;
  document.getElementById('lbImg').src = p.url;
  document.getElementById('lbTitle').textContent = p.title || '无标题';
  document.getElementById('lbDate').textContent = p.date || '';
  document.getElementById('lbCounter').textContent = `${lbIndex + 1} / ${lbFiltered.length}`;
  document.getElementById('lbTags').innerHTML = (p.tags || []).map(tid => {
    const t = allTags.find(x => x.id === tid);
    return t ? `<span class="lb-tag">${t.name}</span>` : '';
  }).join('');
}
function lbNav(d) { lbIndex = (lbIndex + d + lbFiltered.length) % lbFiltered.length; showLb(); }
function closeLb(e) { if (!e || e.target === document.getElementById('lb')) document.getElementById('lb').classList.remove('open'); }
document.addEventListener('keydown', e => {
  if (!document.getElementById('lb').classList.contains('open')) return;
  if (e.key === 'ArrowLeft') lbNav(-1);
  if (e.key === 'ArrowRight') lbNav(1);
  if (e.key === 'Escape') closeLb();
});

init();
</script>
</body>
</html>
